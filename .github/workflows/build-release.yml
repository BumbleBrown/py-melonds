# .github/workflows/build-release.yml
#
# Builds melonds.dll on Windows and packages it as a zip.
# When a version tag is pushed (e.g. v0.1.0), the zip is attached
# to a GitHub release automatically.
#
# Zip contents (extracted into a melonds/ folder by install.py):
#   melonds/
#     __init__.py
#     core.py
#     emulator.py
#     melonds.dll
#
# To publish a release:
#   git tag v0.1.0
#   git push origin v0.1.0

name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:

  build-windows:
    name: Windows x64
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure CMake
        run: |
          cmake -S . -B build `
            -DCMAKE_BUILD_TYPE=Release `
            -DMELONDS_ENABLE_JIT=OFF

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Verify library exists
        run: |
          if (-not (Test-Path "python/melonds/melonds.dll")) {
            Write-Error "melonds.dll was not copied to python/melonds/"
            exit 1
          }

      - name: Create zip
        run: |
          $version = "${{ github.ref_name }}"
          Compress-Archive `
            -Path python/melonds/* `
            -DestinationPath "py-melonds-${version}-win64.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: py-melonds-win64
          path: py-melonds-*-win64.zip

  publish-release:
    name: Publish release
    needs:
      - build-windows
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: "py-melonds ${{ github.ref_name }}"
          body: |
            Pre-built binaries for py-melonds ${{ github.ref_name }}.

            Download the zip and extract it. The melonds/ folder inside
            is the Python package -- no compiler required.

            | Platform | File |
            |---|---|
            | Windows 64-bit | py-melonds-${{ github.ref_name }}-win64.zip |
          files: artifacts/*.zip
          draft: false
          prerelease: false
