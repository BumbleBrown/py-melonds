# .github/workflows/build-release.yml
#
# Builds melonds.dll on Windows using MSYS2/MinGW64 -- the same
# toolchain used for local builds. MSVC is not supported by melonDS.
#
# When a version tag is pushed (e.g. v0.1.0), the zip is attached
# to a GitHub release automatically.
#
# To publish a release:
#   git tag v0.1.0
#   git push origin v0.1.0

name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:

  build-windows:
    name: Windows x64
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            zip

      - name: Configure CMake
        shell: msys2 {0}
        run: |
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DMELONDS_ENABLE_JIT=OFF

      - name: Build
        shell: msys2 {0}
        run: cmake --build build --parallel

      - name: Verify library exists
        shell: msys2 {0}
        run: |
          test -f python/melonds/melonds.dll || \
            (echo "melonds.dll was not copied to python/melonds/" && exit 1)

      - name: Create zip
        shell: msys2 {0}
        run: |
          version="${{ github.ref_name }}"
          cd python && zip -r "../py-melonds-${version}-win64.zip" melonds/ && cd ..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: py-melonds-win64
          path: py-melonds-*-win64.zip

  publish-release:
    name: Publish release
    needs:
      - build-windows
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: "py-melonds ${{ github.ref_name }}"
          body: |
            Pre-built binaries for py-melonds ${{ github.ref_name }}.

            Download the zip and extract it. The melonds/ folder inside
            is the Python package -- no compiler required.

            | Platform | File |
            |---|---|
            | Windows 64-bit | py-melonds-${{ github.ref_name }}-win64.zip |
          files: artifacts/*.zip
          draft: false
          prerelease: false
